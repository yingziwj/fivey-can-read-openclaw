<section class="section-shell"><div class="overview-card"><div><p class="section-kicker">先讲人话版</p><h2>🩹 apply_patch 这页，其实是在讲“别手抠文件，直接交一张结构化补丁施工单”</h2><p>尤其多文件、多段改动时，这张施工单比零散 edit 更稳。</p></div><div class="overview-meta"><span>结构化补丁工具</span><span>重点是 Begin Patch / Update / Add / Delete</span><a href="https://docs.openclaw.ai/tools/apply-patch" target="_blank" rel="noreferrer">查看官方原文</a></div></div></section><section class="section-shell"><div class="section-heading"><p class="section-kicker">第一站</p><h2>📋 它像正式工单，不是随口说一句“帮我改下”</h2><p><code>*** Add File</code> 像新盖房，<code>*** Update File</code> 像翻修，<code>*** Delete File</code> 像拆房。</p></div></section>
